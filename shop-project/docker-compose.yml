version: '3.8'

services:


  db:
    image: postgres:16-alpine
    container_name: shop-db
    environment:
      POSTGRES_DB: shopdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dosik13094664
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shopdb"]
      interval: 10s
      timeout: 5s
      retries: 5


  app:
    build: .
    container_name: shop-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/shopdb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: dosik13094664
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
